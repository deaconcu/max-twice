  <line x1="35" y1="65" x2="35" y2="78" stroke="currentColor" stroke-width="2"/>
  <line x1="35" y1="65" x2="58" y2="50" stroke="currentColor" stroke-width="2"/>
  <line x1="35" y1="65" x2="50" y2="87" stroke="currentColor" stroke-width="2"/>
