  <line x1="58" y1="50" x2="65" y2="78" stroke="currentColor" stroke-width="2" opacity="0.25"/>

  <!-- 正面棱 - 实线 -->
  <line x1="50" y1="13" x2="27" y2="28" stroke="currentColor" stroke-width="2"/>
  <line x1="50" y1="13" x2="42" y2="38" stroke="currentColor" stroke-width="2"/>
