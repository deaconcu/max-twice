<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 正四面体 - 斜上方视角 -->
  <!--
    顶点 A: (50, 15)
    底面三角形:
      B: (20, 75) - 左下
      C: (80, 75) - 右下
      D: (50, 58) - 后方
  -->

  <!-- 背面棱 - 浅色 -->
  <line x1="50" y1="15" x2="50" y2="58" stroke="#3aa876" stroke-width="1.5" opacity="0.25"/>
  <line x1="20" y1="75" x2="50" y2="58" stroke="#3aa876" stroke-width="1.5" opacity="0.25"/>
  <line x1="80" y1="75" x2="50" y2="58" stroke="#3aa876" stroke-width="1.5" opacity="0.25"/>

  <!-- 正面棱 - 实线 -->
  <line x1="50" y1="15" x2="20" y2="75" stroke="#3aa876" stroke-width="2"/>
  <line x1="50" y1="15" x2="80" y2="75" stroke="#3aa876" stroke-width="2"/>
  <line x1="20" y1="75" x2="80" y2="75" stroke="#3aa876" stroke-width="2"/>
</svg>
