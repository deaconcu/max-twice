spring:
  application:
    name: learn-service
  cloud:
    discovery:
      enabled: false  # 禁用服务发现
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration  # 排除Eureka自动配置
  cache:
    type: ${app.cache.type:redis}  # 读取app.cache.type配置，默认redis
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    jdbc-url: jdbc:mysql://127.0.0.1:3307/learn?useSSL=false&characterEncoding=utf-8&tcpKeepAlive=true&autoReconnect=true&zeroDateTimeBehavior=convertToNull
    username: root
    password: root123
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 500
      connection-test-query: SELECT 1
      validation-timeout: 3000
      keepalive-time: 15000
  jackson:
    time-zone: America/Los_Angeles
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.126.com
    port: 465
    username: deaconcc@126.com
    password: HJyGF7GSRD36u5Ev
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
        debug: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379

server:
  port: ${PORT:9202}
  servlet:
    context-path: /

eureka:
  client:
    serviceUrl:
      defaultZone: http://127.0.0.1:8761/eureka/
    register-with-eureka: false  # 不向注册中心注册自己
    fetch-registry: false        # 不从注册中心获取服务列表
  instancen:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  timeout: 72000
  token-name: token
  storage-typee: cookie
  cookie-http-only: true
  cookie-secure: true

app:
  contents:
    max-pinned-items: 10
    pin-field: "^"
    chosen-field: "+"
  user:
    # 用户名最大长度
    max-username-length: 50
    # 密码最小长度
    min-password-length: 6
    # 关注列表分页大小
    follow-page-size: 10
    # 验证码范围
    verification-code-min: 100000
    verification-code-max: 999999
    # 邮件配置
    email-sender: "deaconcc@126.com"
    email-subject: "Your Verification Code"
    # 功能开关
    enable-email-validation: true
    enable-duplicate-follow-check: true
    enable-duplicate-subscription-check: true
  course:
    max-name-length: 100
    default-page-size: 20
    # 课程名称搜索结果限制数量
    search-limit: 50
    # 热门课程排行榜数量限制
    hot-courses-ranking-limit: 100
    # 是否启用课程状态验证
    enable-state-validation: true
    # 是否启用父课程存在性验证
    enable-parent-validation: true
  course-ranking:
    # 默认热门课程列表大小
    default-hot-courses-limit: 20
    # 统计数据清理时的批量大小
    clear-batch-size: 1000
  stats:
    # 系统开始日期（用于历史数据查询起始点）
    system-start-date: "2020-01-01"
    # 最大查询天数范围
    max-query-days-range: 365
    # 最大查询年份范围
    max-query-year-range: 5
    # 是否启用统计数据缓存
    enable-stats-cache: true
    # 缓存过期时间（分钟）
    cache-ttl-minutes: 60
  stats-monitor:
    # Redis健康检查间隔（毫秒）
    health-check-interval: 60000
    # Redis内存监控间隔（毫秒）
    memory-monitor-interval: 3600000
    # 待同步数据警告阈值
    pending-data-threshold: 1000
    # 是否启用Redis健康监控
    enable-health-monitor: true
    # 是否启用内存监控
    enable-memory-monitor: true
    # 是否启用同步状态检查
    enable-sync-status-check: true
    # 是否启用关闭时强制同步
    enable-shutdown-sync: true
  profession:
    # 分页查询默认页面大小
    default-page-size: 20
    # 默认专业图标
    default-icon: "mdi-triangle-outline"
    # 默认热门专业数量限制
    default-hot-professions-limit: 20
    # 最大热门专业数量限制
    max-hot-professions-limit: 100
    # 是否启用专业状态验证
    enable-state-validation: true
    # 是否启用并发状态检查
    enable-concurrency-check: true
  learning-progress:
    # Redis缓存过期时间（天）
    cache-expire-days: 365
    # 同步失败重试间隔（毫秒）
    sync-retry-interval: 60000
    # 课程完成百分比阈值（基点，10000=100%）
    completion-threshold: 10000
    # 进度百分比精度倍数（基点转换）
    progress-precision-multiplier: 10000
    # 默认目录索引
    default-toc-index: 1
    # 是否启用Redis降级到数据库
    enable-database-fallback: true
    # 是否启用定期补偿同步
    enable-retry-sync: true
    # 是否启用层级进度计算
    enable-hierarchical-progress: true
  comment:
    # 默认分页大小
    default-page-size: 10
    # 待审核评论查询数量
    pending-comments-limit: 50
    # 评论缓存过期时间（分钟）
    cache-ttl-minutes: 30
  page:
    # 是否启用路径格式验证
    enable-path-validation: true
    # 是否启用自动路径修复
    enable-auto-path-repair: true
  scheduler:
    # 职业排行榜同步Cron表达式
    profession-ranking-sync-cron: "0 15 * * * ?"
    # 应用启动后初始化延迟时间（毫秒）
    initialization-delay-ms: 10000
    # 是否启用职业排行榜定时同步
    enable-profession-ranking-sync: true
    # 是否启用应用启动时初始化
    enable-startup-initialization: true
    # 数据同步批处理大小
    sync-batch-size: 1000
  roadmap:
    # 默认分页大小
    default-page-size: 20
    # 最大置顶路线图数量
    max-pinned-count: 19
    # 完成进度阈值（基点，10000=100%）
    completion-threshold: 10000
    # 进度精度倍数（基点转换）
    progress-precision-divisor: 100.0
    # 是否启用内容格式验证
    enable-content-validation: true
    # 是否启用权限检查
    enable-permission-check: true
    # 是否启用批量状态查询优化
    enable-batch-status-query: true
  cache:
    type: none  # redis 启用缓存，none 关闭所有缓存
  validation:
    # 评论相关
    comment-content-min-length: 1
    comment-content-max-length: 500
    # 用户相关
    username-min-length: 3
    username-max-length: 20
    password-min-length: 8
    password-max-length: 20
    biography-max-length: 100
    email-max-length: 254
    phone-max-length: 20
    # 课程相关
    course-name-min-length: 2
    course-name-max-length: 40
    course-description-min-length: 20
    course-description-max-length: 1000
    # 帖子相关
    post-content-min-length: 10
    post-content-max-length: 20000
    # 专业相关
    profession-name-min-length: 2
    profession-name-max-length: 30
    profession-description-min-length: 20
    profession-description-max-length: 2000
    # 记忆卡片相关
    card-front-min-length: 5
    card-front-max-length: 500
    card-back-min-length: 1
    card-back-max-length: 500
    deck-title-min-length: 2
    deck-title-max-length: 30
    deck-description-max-length: 200
    # 消息相关
    message-content-min-length: 1
    message-content-max-length: 1000
    # 路线图相关
    roadmap-content-min-length: 1
    roadmap-content-max-length: 5000
    roadmap-description-min-length: 1
    roadmap-description-max-length: 500
  data-service:
    # 批量更新最大数量限制
    max-batch-update-size: 50

# 图片上传配置
upload:
  quota:
    # 最小上传间隔(秒)
    min-interval: 1
    # 每分钟限制
    minute-limit: 20
    # 每小时限制
    hour-limit: 100
    # 每天限制
    daily-limit: 200
  file:
    # 文件大小限制(字节，5MB)
    max-size: 5242880
    # 图片尺寸限制(像素)
    max-dimension: 4096
    # 允许的文件类型（逗号分隔）
    allowed-types: image/jpeg,image/png,image/webp
  compression:
    # 是否启用压缩
    enabled: true
    # 最大宽度
    max-width: 2048
    # 最大高度
    max-height: 2048
    # 压缩质量(0.0-1.0)
    quality: 0.85
    # 输出格式（jpg 原生支持，稳定可靠）
    format: jpg

# Cloudflare R2配置
cloudflare:
  r2:
    # 账号ID
    account-id: ${CLOUDFLARE_R2_ACCOUNT_ID:your-account-id}
    # 访问密钥ID
    access-key-id: ${CLOUDFLARE_R2_ACCESS_KEY_ID:your-access-key-id}
    # 访问密钥
    secret-access-key: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:your-secret-access-key}
    # 存储桶名称
    bucket-name: ${CLOUDFLARE_R2_BUCKET_NAME:maxtwice-images}
    # 公开域名
    public-domain: ${CLOUDFLARE_R2_PUBLIC_DOMAIN:https://images.maxtwice.com}

  # AI服务配置
  ai:
    # API密钥（通过环境变量设置）
    api-key: ${AI_API_KEY:}
    # API服务地址
    api-url: https://openrouter.ai/api/v1/chat/completions
    # 默认使用的AI模型
    default-model: gpt-3.5-turbo
    # 温度参数（控制回复随机性，0-2之间）
    temperature: 0.7
    # 系统角色提示词
    system-prompt: "你是一个老师，能把复杂的问题用生动的方式讲的很容易让人理解"
    # 请求超时时间（毫秒）
    request-timeout-ms: 30000
    # 最大重试次数
    max-retries: 3

  # SRS复习算法配置
  srs:
    algorithm:
      # 学习步骤(分钟): 新卡片的学习步骤，默认[10, 60]表示第一步10分钟后，第二步60分钟后
      learning-steps: [10, 60]
      # 重学步骤(分钟): 遗忘卡的重新学习步骤，默认[20]表示20分钟后
      relearning-steps: [20]
      # 毕业间隔(天): 学习中卡片首次毕业后的复习间隔
      graduating-interval: 1
      # 简单间隔(天): 新卡被评为"简单"后，直接毕业的间隔
      easy-interval: 4
      # 简单奖励: 对"复习"卡片评为"简单"时的额外间隔奖励乘数
      easy-bonus: 1.3
      # 新间隔乘数: 遗忘后重新毕业时的间隔恢复比例(0.2-0.8, Anki推荐0.5-0.7)
      new-interval-multiplier: 0.5
      # 最小难度因子: EF的最小值
      min-ease-factor: 1.3

logging:
  level:
    com.prosper.learn: INFO
    com.prosper.learn.persistence.mapper: DEBUG  # MyBatis Mapper SQL日志
    org.springframework.web: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org.apache.ibatis: DEBUG
    java.sql: DEBUG
    org.mybatis.spring.SqlSessionFactoryBean: DEBUG