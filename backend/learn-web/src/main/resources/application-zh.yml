spring:
  config:
    activate:
      on-profile: zh
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/learn_zh?useSSL=false&characterEncoding=utf-8&tcpKeepAlive=true&autoReconnect=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
  messages:
    basename: messages/messages_zh
    encoding: UTF-8
  web:
    resources:
      static-locations: classpath:/static/zh/

server:
  port: ${PORT:8080}

app:
  locale: zh_CN
  site-name: 学习平台
  default-language: zh
  base-url: ${BASE_URL:https://zh.yoursite.com}