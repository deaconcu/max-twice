# 迁移工具专用配置
# 只包含必要的配置，不依赖其他服务

spring:
  application:
    name: migration-runner

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # 多数据源配置
  datasource:
    # 用户数据库（共享）
    user:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://127.0.0.1:3307/learn_user?useSSL=false&characterEncoding=utf-8
      username: root
      password: root123
      hikari:
        minimum-idle: 2
        maximum-pool-size: 3
        pool-name: UserHikariPool
    # 业务数据库 - 中文站
    business-zh:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://127.0.0.1:3307/learn_zh?useSSL=false&characterEncoding=utf-8
      username: root
      password: root123
      hikari:
        minimum-idle: 2
        maximum-pool-size: 3
        pool-name: BusinessZhHikariPool
    # 业务数据库 - 英文站
    business-en:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://127.0.0.1:3307/learn_en?useSSL=false&characterEncoding=utf-8
      username: root
      password: root123
      hikari:
        minimum-idle: 2
        maximum-pool-size: 3
        pool-name: BusinessEnHikariPool

  # 禁用缓存（不需要 Redis）
  cache:
    type: none

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true

# 应用配置
app:
  default-language: zh

# 日志配置
logging:
  level:
    root: INFO
    com.prosper.learn: DEBUG
    com.prosper.learn.tools: DEBUG
