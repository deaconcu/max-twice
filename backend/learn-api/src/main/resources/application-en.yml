spring:
  config:
    activate:
      on-profile: en
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/learn_en?useSSL=false&characterEncoding=utf-8&tcpKeepAlive=true&autoReconnect=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
  messages:
    basename: messages/messages_en
    encoding: UTF-8
  web:
    resources:
      static-locations: classpath:/static/en/

server:
  port: ${PORT:8081}

app:
  locale: en_US
  site-name: Learning Platform
  default-language: en
  base-url: ${BASE_URL:https://en.yoursite.com}