spring:
  application:
    # 服务标识
    name: twicemax-service
  autoconfigure:
    # 项目使用自定义多数据源（DataSourceConfig.java），必须排除默认的单数据源自动配置，否则会冲突。
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration  # 禁用默认数据源自动配置
  cache:
    # 使用 Redis 作为缓存实现 支持 none/redis
    type: redis
  # 多数据源配置
  datasource:
    # 用户数据库（共享）
    user:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${DB_HOST}:${DB_PORT}/twicemax_user?useSSL=false&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      hikari:
        minimum-idle: 3
        maximum-pool-size: 5
        pool-name: UserHikariPool
    # 业务数据库 - 中文站
    business-zh:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${DB_HOST}:${DB_PORT}/twicemax_zh?useSSL=false&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      hikari:
        minimum-idle: 5
        maximum-pool-size: 10
        pool-name: BusinessZhHikariPool
    # 业务数据库 - 英文站
    business-en:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${DB_HOST}:${DB_PORT}/twicemax_en?useSSL=false&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      hikari:
        minimum-idle: 3
        maximum-pool-size: 5
        pool-name: BusinessEnHikariPool
  jackson:
    # 后端统一 UTC 时区，前端根据用户时区转换显示
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: ${MAIL_PORT}
        debug: ${MAIL_DEBUG}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  # Flyway：自动配置只认 spring.datasource 单库，项目是多库自定义 DataSource，
  # 这里禁用自动配置，由 FlywayConfig 手动创建 3 个 Flyway bean 分别绑库。
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT}
  address: ${SERVER_ADDRESS}

# Meilisearch 配置
meilisearch:
  enabled: ${MEILISEARCH_ENABLED}
  host: ${MEILISEARCH_HOST}
  port: ${MEILISEARCH_PORT}
  api-key: ${MEILISEARCH_API_KEY}

# OpenRouter Embedding配置
openrouter:
  api-key: ${OPENROUTER_API_KEY}
  embedding-url: https://openrouter.ai/api/v1/embeddings
  embedding-model: openai/text-embedding-3-small

# Milvus向量数据库配置
milvus:
  enabled: ${MILVUS_ENABLED}
  host: ${MILVUS_HOST}
  port: ${MILVUS_PORT}
  collection-name: node_embeddings
  vector-dim: 1536

mybatis:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  # Token 有效期（秒），72000秒 = 20小时。用户登录后，20小时内无需重新登录
  timeout: 72000
  token-name: token
  storage-type: cookie
  # 禁止 JS 访问 Cookie
  cookie-http-only: true
  # 仅 HTTPS 传输
  cookie-secure: true


# Cloudflare R2配置
cloudflare:
  r2:
    account-id: ${CLOUDFLARE_R2_ACCOUNT_ID}
    access-key-id: ${CLOUDFLARE_R2_ACCESS_KEY_ID}
    secret-access-key: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
    bucket-name: ${CLOUDFLARE_R2_BUCKET_NAME}
    public-domain: ${CLOUDFLARE_R2_PUBLIC_DOMAIN}

# Turnstile 人机验证配置
turnstile:
  # 从环境变量读取（必须配置）
  secret-key: ${TURNSTILE_SECRET_KEY}
  # 是否启用验证
  enabled: ${TURNSTILE_ENABLED:true}

logging:
  level:
    # 业务代码
    com.twicemax: INFO
    # 框架日志
    org.springframework: WARN
    org.apache.ibatis: WARN
    org.mybatis: WARN
    java.sql: WARN
    # 按需开启调试（默认关闭）
    # com.twicemax.infrastructure.image: DEBUG  # R2 上传
    # com.twicemax.persistence.mapper: DEBUG    # SQL 日志

app:
  # 默认语言
  default-language: en
  # 内测模式：true 时仅管理员可登录/注册（通过环境变量 APP_INVITE_ONLY_MODE 控制）
  invite-only-mode: ${INVITE_ONLY_MODE:false}
  # 图片上传配置
  upload:
    quota:
      # 最小上传间隔(秒)
      min-interval: 1
      # 每分钟限制
      minute-limit: 20
      # 每小时限制
      hour-limit: 100
      # 每天限制
      daily-limit: 200
    file:
      # 文件大小限制(字节，5MB)
      max-size: 5242880
      # 图片尺寸限制(像素)
      max-dimension: 4096
      # 允许的文件类型（逗号分隔）
      allowed-types: image/jpeg,image/png,image/webp
    compression:
      # 是否启用压缩
      enabled: true
      # 最大宽度
      max-width: 2048
      # 最大高度
      max-height: 2048
      # 压缩质量(0.0-1.0)
      quality: 0.85
      # 输出格式（jpg 原生支持，稳定可靠）
      format: jpg
  stats:
    # 系统开始日期（用于历史数据查询起始点）
    system-start-date: "2025-01-01"
    # 最大查询天数范围
    max-query-days-range: 365
  stats-monitor:
    # 待同步数据警告阈值
    pending-data-threshold: 1000
    # 是否启用Redis健康监控
    enable-health-monitor: true
    # 是否启用内存监控
    enable-memory-monitor: true
    # 是否启用同步状态检查
    enable-sync-status-check: true
    # 是否启用关闭时强制同步
    enable-shutdown-sync: true
  scheduler:
    # 是否启用角色排行榜定时同步
    enable-role-ranking-sync: false
    # 是否启用应用启动时初始化（角色排行榜）
    enable-role-ranking-startup-init: false
  # 用户相关配置
  user:
    # 验证码过期时间（分钟）
    verification-code-expiry-minutes: 10
    # 验证码发送间隔（秒）
    verification-code-send-interval-seconds: 60
  validation:
    # 评论相关
    comment-content-min-length: 1
    comment-content-max-length: 500
    # 用户相关
    username-min-length: 3
    username-max-length: 20
    password-min-length: 8
    password-max-length: 20
    biography-max-length: 100
    email-max-length: 254
    phone-max-length: 20
    # 课程相关
    course-name-min-length: 2
    course-name-max-length: 40
    course-description-min-length: 20
    course-description-max-length: 1000
    # 帖子相关
    post-content-min-length: 10
    post-content-max-length: 20000
    # 角色相关
    role-name-min-length: 2
    role-name-max-length: 30
    role-description-min-length: 20
    role-description-max-length: 2000
    # 记忆卡片相关
    card-front-min-length: 5
    card-front-max-length: 500
    card-back-min-length: 1
    card-back-max-length: 500
    deck-description-max-length: 200
    # 消息相关
    message-content-min-length: 1
    message-content-max-length: 1000
    # 路线图相关
    roadmap-content-min-length: 1
    roadmap-content-max-length: 5000
    roadmap-description-min-length: 1
    roadmap-description-max-length: 500
  # AI服务配置
  robot:
    # AI用户ID
    ai-user-id: 85
    # 执行器轮询间隔（秒）
    poll-interval-sec: 10
    # AI服务: opencode, gemini, openrouter
    ai-service: gemini
    # AI模型
    model: gemini-3-flash-preview
    # OpenRouter API Key（从环境变量读取）
    openrouter-api-key: ${OPENROUTER_API_KEY}
  # SRS复习算法配置
  srs:
    # 节点下最大卡片数量限制
    max-cards-per-node: 200
    # 用户最大学习卡片数量限制
    max-cards-per-user: 10000
    # 每日新卡上限默认值
    default-daily-new-limit: 20
    # 每日复习上限默认值
    default-daily-review-limit: 100
    algorithm:
      # 卡片间隔数组: LEARNING/RELEARNING 阶段共用
      # 表示每个步骤需要间隔多少张卡片后再现
      # [3, 8] 表示 Step 0 间隔 3 张，Step 1 间隔 8 张
      card-gaps: [3, 8]
      # 毕业间隔(天): 学习中卡片首次毕业后的复习间隔
      graduating-interval: 1
      # 简单间隔(天): 新卡被评为"简单"后，直接毕业的间隔
      easy-interval: 4
      # 简单奖励: 对"复习"卡片评为"简单"时的额外间隔奖励乘数
      easy-bonus: 1.3
      # 新间隔乘数: 遗忘后重新毕业时的间隔恢复比例(0.2-0.8, Anki推荐0.5-0.7)
      new-interval-multiplier: 0.5
      # 最小难度因子: EF的最小值
      min-ease-factor: 1.3
