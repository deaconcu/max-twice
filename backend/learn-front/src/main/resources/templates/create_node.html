<!doctype html>
<html lang="en">
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragment :: head(~{::title},~{})">
  <title>Hello, world!</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragment :: header"></header>
<div class="container">
  <div class="row align-items-start" style="padding-top:5.3em">
    <div class="col-9">
      <div class="d-flex align-items-center">
        <div class="flex-grow-1">
          <span class="fs-5"><i class="bi-plus"></i> 添加节点</span>
        </div>
      </div>
      <div class="my-4">
        <span class="h5" th:text="${course.name}">JAVA</span> -
        <span class="h5" th:text="${subcourse.name}">JAVA</span>
      </div>

      <div class="">
        <div class="mb-3">
          <form th:action="@{'/subcourse-' + ${subcourse.id} + '/node/create'}" th:object="${node}" method="post">
            <div class="mb-3">
              <label for="exampleFormControlInput1" class="form-label">请输入节点名称：</label>
              <input th:field="*{name}" type="text" class="form-control" id="exampleFormControlInput1" placeholder="节点名称">
            </div>
            <div class="mb-3">
              <label for="exampleFormControlTextarea1" class="form-label">请输入节点解释：</label>
              <textarea th:field="*{description}" class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="节点解释"></textarea>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">提交</button>
            </div>
          </form>
        </div>
      </div>
      <!--
      <div class="my-4">
        <nav class="nav small">
          <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true"><h6>切面: </h6></a>
          <a class="nav-link text-body" href="#">能干什么</a>
          <a class="nav-link text-body" href="#">入门</a>
          <a class="nav-link text-body" href="#">普通</a>
          <a class="nav-link text-body" href="#">精通</a>
          <a class="nav-link text-body" href="#">预备考试</a>
        </nav>
      </div>
    -->
    </div>
    <div class="col-3 ps-5 pt-3">
      <div class="card text-center shadow-ct">
        <div class="card-header">
          <ul class="nav nav-pills card-header-pills">
            <li class="nav-item">
              <a class="nav-link active" href="#">Active</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Link</a>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
            </li>
          </ul>
        </div>
        <div class="card-body">
          <h5 class="card-title">Special title treatment</h5>
          <p class="card-text">With supporting text below as a natural lead-in to additional content.</p>
          <a href="#" class="btn btn-primary">Go somewhere</a>
        </div>
      </div>
      <div class="mt-5">
        <h6 class="px-3"> 相关课程 </h6>
        <nav class="nav small flex-column lh-1">
          <a class="nav-link active" aria-current="page" href="#">Active</a>
          <a class="nav-link" href="#">Link</a>
          <a class="nav-link" href="#">Link</a>
          <a class="nav-link" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
        </nav>
      </div>
    </div>
  </div>
</div>
<footer th:replace="fragment :: footer"></footer>
</body>
</html>
