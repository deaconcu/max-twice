<div class="container">
  <div th:replace="fragment :: node_table"></div>
  <div class="row align-items-start" style="padding-top:5.3em">

    <div class="col-2">
      <!--
      <div class="card text-center shadow-ct">

      <div>
        <nav class="nav small flex-column lh-2 fs-6">
          <a class="nav-link text-black fw-bold active" aria-current="page" href="#">课程</a>
          <a class="nav-link text-black" href="#">节点</a>
          <a class="nav-link text-black" href="#">文章</a>
        </nav>
      </div>
    </div>

    <div class="col-10 ps-5 border-start mb-5" style="min-height: 500px;">
      <div class="">
        <ul class="list-group list-group-flush">
          <li class="list-group-item py-4" th:each="course,itStat : ${courses}">
            <div class="row">
              <div class="col-6">
                <h5 th:text="${course.name}" />
                <div class="my-2" th:text="${course.description}" />
                <div class="d-flex">
                  <div class="flex-grow-1 text-muted small" th:text="${course.cTime}">2002-11-11 10:10:56</div>
                </div>
              </div>
              <div class="col-6 text-end" th:switch="${course.state}">
                <span th:case="1" class="badge bg-warning"> 审批中</span>
                <span th:case="2" class="badge bg-success">已通过</span>
                <span th:case="3" class="badge bg-danger">未通过</span>
                <span th:case="*" class="badge bg-secondary">未知状态</span>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
<footer th:replace="fragment :: footer"></footer>
